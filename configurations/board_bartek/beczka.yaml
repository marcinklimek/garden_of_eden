###############################################################################
# Garden Soil Moisture Sensor Configuration
###############################################################################

# Basic Information
esphome:
  name: beczka
  friendly_name: "beczka"
  comment: "beczka"


# ESP32 Board Configuration
esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable Captive Portal for WiFi setup
captive_portal:

# Enable Web Server Interface
web_server:
  port: 80
  local: true
  include_internal: true


# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
  - platform: esphome

# Allow provisioning Wi-Fi via serial
improv_serial:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Enable Logging
logger:

# Time Management
time:
  - platform: homeassistant
    id: homeassistant_time

# czarny - zasilanie
# niebieski high
# zolty - mid
# czerwony - low
# Example configuration entry
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO21
      mode:
        input: true
        pullup: true
    name: "level_high"
    filters:
      - delayed_on: 10ms

  - platform: gpio
    pin:
      number: GPIO19
      mode:
        input: true
        pullup: true
    name: "level_mid"
    filters:
      - delayed_on: 10ms


  - platform: gpio
    pin:
      number: GPIO18
      mode:
        input: true
        pullup: true
    name: "level_low"
    filters:
      - delayed_on: 10ms


