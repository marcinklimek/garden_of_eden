substitutions:
  name: mermaid-esp
  friendly_name: mermaid
  

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false


# ESP32 Board Configuration
esp32:
  board: esp32dev
  framework:
    type: arduino

ota:
  - platform: esphome
    password: !secret ota_password
    on_progress:
      then:
        - logger.log:
            format: "OTA progress %0.1f%%"
            args: ["x"]
    on_begin:
      then:
        - logger.log: "OTA start"
    on_end:
      then:
        - logger.log: "OTA end"
    on_error:
      then:
        - logger.log:
            format: "OTA update error %d"
            args: ["x"]

# Enable Captive Portal for WiFi setup
captive_portal:

# Enable Web Server Interface
web_server:
  port: 80
  local: true
  include_internal: true
  version: 3

# Enable logging
logger:
  

# Time Management
time:
  - platform: homeassistant
    id: homeassistant_time


# Enable Home Assistant API
api:


improv_serial:


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


# Sets up Bluetooth LE (Only on ESP32) to allow the user
# to provision wifi credentials to the device.

esp32_improv:
  authorizer: none


sensor:
  # WiFi
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    unit_of_measurement: dB
    device_class: signal_strength
    accuracy_decimals: 0
    update_interval: 50s

  - platform: uptime
    type: seconds
    name: Uptime

output:
  - platform: gpio
    pin: GPIO02
    id: 'out16'

  - platform: gpio
    pin: GPIO04
    id: 'out17'

  - platform: gpio
    pin: GPIO16
    id: 'out5'

  - platform: gpio
    pin: GPIO17
    id: 'out18'


switch:

  - platform: output
    name: "mermaid_01"
    output: 'out16'
    id: mermaid_01

  - platform: output
    name: "mermaid_02"
    output: 'out17'
    id: mermaid_02

  - platform: output
    name: "mermaid_03"
    output: 'out5'
    id: mermaid_03

  - platform: output
    name: "mermaid_04"
    output: 'out18'
    id: mermaid_04


text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    mac_address:
      name: "Mac Address"
    ssid:
      name: "Wifi SSID"
